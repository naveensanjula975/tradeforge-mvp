# ─── Test Profile ─────────────────────────────────────────────────────────────
# Used by JUnit tests. Testcontainers overrides the datasource URL at runtime.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16-alpine:///tradeforge_test}
    username: ${SPRING_DATASOURCE_USERNAME:tradeforge}
    password: ${SPRING_DATASOURCE_PASSWORD:test_password}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    clean-disabled: false      # Allow clean in tests for isolation

app:
  seed:
    enabled: false            # No seed data in test profile
  jwt:
    secret: test_jwt_secret_must_be_at_least_32_characters_long
    expiration-ms: 3600000

logging:
  level:
    root: WARN
    com.tradeforge: WARN
    org.flywaydb: INFO
