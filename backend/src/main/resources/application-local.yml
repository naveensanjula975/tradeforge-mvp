# ─── Local Development Profile ───────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=local

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tradeforge}
    username: ${SPRING_DATASOURCE_USERNAME:tradeforge}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TradeForge-HikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

# Seed demo data only in local mode
app:
  seed:
    enabled: true
  jwt:
    secret: ${JWT_SECRET:local_dev_secret_must_be_at_least_32_chars_long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h in local dev

logging:
  level:
    com.tradeforge: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.flywaydb: INFO
